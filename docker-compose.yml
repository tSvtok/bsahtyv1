services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: ${USER:-reddcs}
        uid: ${UID:-1000}
    image: ecomcom-app
    container_name: ecomcom-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage:/var/www/storage
      - ./backend/bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: ecomcom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ecomcom}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    image: nginx:alpine
    container_name: ecomcom-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    image: node:20-alpine
    container_name: ecomcom-frontend
    restart: unless-stopped
    user: "node"
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  reverb:
    image: ecomcom-app
    container_name: ecomcom-reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
    driver: local
